<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:800px;
    height:400px;
    border:2px solid #fff;
    display:flex;
}

.left, .right{
    width:50%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    border-right:2px solid #fff;
}

.right{
    border-right:none;
}

.card{
    width:220px;
    height:280px;
    border:2px solid #fff;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.circle-img{
    width:100px;
    height:100px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid #fff;
}

.circle-img img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h2{
    color:#fff;
}

button{
    padding:10px 25px;
    border:none;
    border-radius:25px;
    background:#00ff88;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#fff;
}

.text-box{
    width:250px;
    height:100px;
    border:2px solid #fff;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:30px;
    font-size:22px;
}
</style>
</head>

<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">
        <div class="card">
            <div class="circle-img">
                <img src="https://picsum.photos/200" alt="Profile">
            </div>
            <h2>Name</h2>
            <button>Button</button>
        </div>
    </div>

    <!-- Right Side -->
    <div class="right">
        <div class="text-box">Text</div>
        <button>Button</button>
    </div>

</div>

</body>
</html>
